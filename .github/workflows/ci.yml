name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install lint tools
        run: brew install swiftlint swiftformat

      - name: SwiftFormat (check)
        run: swiftformat --lint RBGApp/Sources tools

      - name: SwiftLint
        run: swiftlint lint --quiet

      - name: Build
        run: swift build --package-path RBGApp

      - name: Test
        run: swift test --package-path RBGApp
