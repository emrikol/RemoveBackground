# .github/workflows/allow-collab-prs.yml
name: Allow only collaborator PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  gatekeep:
    # Personal repo: only OWNER or COLLABORATOR may open PRs.
    if: ${{ !contains(fromJson('["OWNER","COLLABORATOR"]'), github.event.pull_request.author_association)
            && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const assoc = context.payload.pull_request.author_association;
            const pr = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const msg = [
              'Thanks for your interest! This repository is published as-is under the PolyForm Noncommercial 1.0.0 license (non-commercial use only).',
              '',
              '**We do not provide support, and Issues are disabled.** Pull requests are accepted only from collaborators explicitly added to this repository.',
              '',
              'If you are not a collaborator, please **fork this project** (for non-commercial use, per the license) and continue development there. To avoid confusion, we kindly ask redistributors of modified versions to use a different project name and branding.',
              '',
              '## Why This Policy?',
              '',
              'Remove Background is a personal, non-commercial project. It depends on third-party ML models that can change upstream, and supporting every hardware / macOS combination is beyond its scope.',
              '',
              '---',
              '',
              `Your association: **${assoc}**.`
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: pr,
              body: msg
            });

            await github.rest.pulls.update({
              owner, repo, pull_number: pr, state: 'closed'
            });
